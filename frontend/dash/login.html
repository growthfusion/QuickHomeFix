<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – QuickHomeFix Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white p-6 rounded-2xl shadow-sm w-80">
    <h1 class="text-2xl font-semibold text-center mb-5">Login</h1>
    <input type="text" placeholder="Email" class="w-full p-2 border rounded-md mb-3 focus:outline-none" />
    <input type="password" placeholder="Password" class="w-full p-2 border rounded-md mb-3 focus:outline-none" />
    <button onclick="window.location.href='/dash/'" class="w-full bg-blue-500 text-white p-2 rounded-md hover:bg-blue-600">Login</button>
  </div>
</body>
</html>
