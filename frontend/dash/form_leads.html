      const body = t.rows.map(r => {
        const cells = r.map((v,i) => {
          if (i === 0) return `<td class="label">${v}</td>`;
          const isPct = typeof v === "string" && v.endsWith("%");
          let cls = "num";
          if (isPct) {
            const num = parseFloat(v);
            if (PCT_INDICES_GOOD.has(i) && num >= 70) cls += " pct-good";
            else if (PCT_INDICES_BAD.has(i)) cls += " pct-bad";
          }
          return `<td class="${cls}">${v}</td>`;
        }).join("");
        return `<tr>${cells}</tr>`;
      }).join("");

      return `
        <div class="pt-6">
          <h3 class="text-sm font-bold text-gray-600 mb-2 uppercase">${t.title}</h3>
          <div class="overflow-x-auto bg-white rounded-lg shadow w-full">
            <table class="metric-table w-full divide-y divide-gray-200">
              <thead class="sticky top-0 z-10"><tr>${headers}</tr></thead>
              <tbody class="divide-y divide-gray-200">${body}</tbody>
            </table>
          </div>
        </div>`;
    }

    document.getElementById("tables-container").innerHTML = TABLES.map(renderTable).join("");
  </script>
</body>
</html>
