<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/dash/auth.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Steps – QuickHomeFix Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/styles.css" />
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
      <h1 class="text-lg font-bold text-gray-800">QuickHomeFix Dashboard</h1>
      <nav class="flex gap-4 text-sm">
        <a href="/dash" class="text-gray-600 hover:text-blue-600">Dashboard</a>
        <a href="/dash/form_leads" class="text-gray-600 hover:text-blue-600">Form Leads</a>
        <a href="/dash/form_leads_full" class="text-gray-600 hover:text-blue-600">Full Leads</a>
        <a href="/dash/forms/pre_sales" class="text-gray-600 hover:text-blue-600">Pre Sales</a>
        <a href="/dash/forms/form_steps" class="text-blue-600 font-medium">Form Steps</a>
        <a href="/dash/bucket_affiliate_statistics" class="text-gray-600 hover:text-blue-600">Statistics</a>
        <a href="/dash/bucket_affiliate_settings" class="text-gray-600 hover:text-blue-600">Settings</a>
      </nav>
    </div>
  </header>
  <div class="max-w-7xl mx-auto p-6">
    <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
      <h2 class="text-xl font-bold mb-4 text-gray-800">Form Steps Analytics</h2>
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200 text-sm">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Step</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Views</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Completions</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Drop-off %</th>
            </tr>
          </thead>
          <tbody class="bg-white divide-y divide-gray-200">
            <tr class="hover:bg-yellow-50"><td class="px-4 py-3 font-medium">Zipcode</td><td class="px-4 py-3">5604</td><td class="px-4 py-3">4200</td><td class="px-4 py-3">25.1%</td></tr>
            <tr class="hover:bg-yellow-50"><td class="px-4 py-3 font-medium">Service Type</td><td class="px-4 py-3">4200</td><td class="px-4 py-3">3500</td><td class="px-4 py-3">16.7%</td></tr>
            <tr class="hover:bg-yellow-50"><td class="px-4 py-3 font-medium">Email</td><td class="px-4 py-3">3500</td><td class="px-4 py-3">2800</td><td class="px-4 py-3">20.0%</td></tr>
            <tr class="hover:bg-yellow-50"><td class="px-4 py-3 font-medium">Address</td><td class="px-4 py-3">2800</td><td class="px-4 py-3">2200</td><td class="px-4 py-3">21.4%</td></tr>
            <tr class="hover:bg-yellow-50"><td class="px-4 py-3 font-medium">Name</td><td class="px-4 py-3">2200</td><td class="px-4 py-3">1800</td><td class="px-4 py-3">18.2%</td></tr>
            <tr class="hover:bg-yellow-50"><td class="px-4 py-3 font-medium">Phone</td><td class="px-4 py-3">1800</td><td class="px-4 py-3">856</td><td class="px-4 py-3">52.4%</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
