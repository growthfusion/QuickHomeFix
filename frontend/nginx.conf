server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    if ($request_uri ~ ^/(.*)\.html(\?|$)) {
        return 301 /$1;
    }

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
