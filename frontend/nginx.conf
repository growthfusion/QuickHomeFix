server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    absolute_redirect off;
    port_in_redirect off;

    if ($request_uri ~ ^/(.*)\.html(\?|$)) {
        return 301 /$1;
    }

    if ($request_uri ~ ^/get-quotes\?service=([a-zA-Z0-9_-]+)) {
        return 301 /get-quotes/$1;
    }

    location ~ ^/get-quotes/[a-zA-Z0-9_-]+/?$ {
        try_files /get-quotes.html =404;
    }

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri.html $uri/ @catchall;
    }

    location @catchall {
        return 302 /;
    }
}
